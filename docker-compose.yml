# ============================================================
#   EstelarBot - Docker Compose
# ============================================================

version: '3.8'

services:
  estelarbot:
    build: .
    container_name: estelarbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
